<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nigeria - Country Page</title>
    <meta name="description" content="Learn about Nigeria, including its capital, population, area, languages, currency, and government.">
    <meta name="author" content="Raphael Omonayin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/place.css" />
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Nigeria</h1>
    </header>
    <main>
        <section class="hero">
            <picture>
                <source
                    media="(max-width: 480px)"
                    srcset="https://picsum.photos/seed/nigeria/480/320.webp 480w,
                            https://picsum.photos/seed/nigeria/640/427.webp 640w"
                    sizes="100vw"
                />
                <source
                    media="(max-width: 1024px)"
                    srcset="https://picsum.photos/seed/nigeria/768/512.webp 768w,
                            https://picsum.photos/seed/nigeria/1024/683.webp 1024w"
                    sizes="100vw">
                <source
                    media="(min-width: 1025px)"
                    srcset="https://picsum.photos/seed/nigeria/1200/800.webp 1200w,
                            https://picsum.photos/seed/nigeria/1600/1067.webp 1600w"
                    sizes="100vw">
                <img
                    src="https://picsum.photos/seed/nigeria/800/600.webp"
                    alt="Scenic view of Nigeria"
                    loading="lazy">
            </picture>
        </section>

        <section class="data-section">
            <h2>Data</h2>
            <dl>
                <dt>Capital</dt>
                <dd>Abuja</dd>

                <dt>Population</dt>
                <dd>218 million</dd>

                <dt>Area</dt>
                <dd>923,768 km²</dd>

                <dt>Languages</dt>
                <dd>English, Hausa, Yoruba, Igbo</dd>

                <dt>Currency</dt>
                <dd>Naira (NGN)</dd>

                <dt>Government</dt>
                <dd>Federal presidential republic</dd>
            </dl>
        </section>

        <section class="weather-section">
            <h2>Weather</h2>   
            <div class="weather-icon-mobile" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
                    <path d="M6.5 11.5a4.5 4.5 0 0 1 4.5-4.5 4.47 4.47 0 0 1 4.17 2.77A3.5 3.5 0 0 1 18 13.5a3.5 3.5 0 0 1-3.5 3.5h-8A3.5 3.5 0 0 1 3 13.5a3.5 3.5 0 0 1 3.5-3.5z" opacity="0.3"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    <circle cx="12" cy="12" r="4"/>
                </svg>
            </div>

            <dl>
                <dt>Temperature</dt>
                <dd id="temp-display">5 °C</dd>        
                <dt>Conditions</dt>
                <dd>Harmattan</dd>

                <dt>Humidity</dt>
                <dd>30 %</dd>

                <dt>Wind Speed</dt>
                <dd id="wind-display">10 km/h</dd>     

                <dt>Wind Chill</dt>
                <dd id="windchill-display">—</dd>
            </dl>
        </section>
    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> ♠️ Raphael Omonayin ♠️ Nigeria
        </p>
        <p id="last-modified"></p>
    </footer>
</body>
</html>
